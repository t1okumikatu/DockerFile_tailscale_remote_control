services:
  go2rtc:
    image: alexxit/go2rtc
    container_name: go2rtc
    network_mode: host
    privileged: true
    restart: always
    shm_size: '2gb'
    environment:
      - GO2RTC_CONFIG=/config/go2rtc.yaml
    devices:
      - /dev/video0:/dev/video0
      - /dev/ttyACM0:/dev/ttyACM0  # ← 1で確認した名前に合わせて書き換え   
    volumes:
      - ./config:/config

  ts-bridge:
    image: tailscale/tailscale:latest
    container_name: ts-bridge
    hostname: keime-docker
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ./ts-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: always

  robot-app:
    image: python:3.11-slim
    container_name: robot-control
    volumes:
      - .:/app
    working_dir: /app
    privileged: true
    tty: true
    stdin_open: true
    command: python3 --version
    restart: always
