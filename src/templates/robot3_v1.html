<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Robot Control Center</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* コントロールパネル（新設） */
        .control-panel {
            display: flex;
            background: #161b22;
            padding: 15px 30px;
            border-radius: 15px;
            border: 1px solid #30363d;
            gap: 40px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .group-label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-container {
            display: flex;
            gap: 10px;
        }

        button {
            width: 100px;
            padding: 10px;
            font-weight: bold;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            background: #21262d;
            color: #8b949e;
        }

        /* モードボタンの配色 */
        #btn-manual.active { background: #1f6feb; color: white; box-shadow: 0 0 10px rgba(31,111,235,0.5); }
        #btn-auto.active { background: #8957e5; color: white; box-shadow: 0 0 10px rgba(137,87,229,0.5); }

        /* システムボタンの配色 */
        #btn-run.active { background: #238636; color: white; box-shadow: 0 0 10px rgba(35,134,54,0.5); }
        #btn-stop.active { background: #da3633; color: white; box-shadow: 0 0 10px rgba(218,54,51,0.5); }

        /* カメラレイアウト */
        .camera-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .camera-box {
            border: 2px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        img {
            display: block;
            width: 480px;
            height: 360px;
            object-fit: cover;
        }

        /* テレメトリ表示 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 975px;
        }

        .stat-card {
            background: #161b22;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #30363d;
            text-align: center;
        }

        .stat-label { font-size: 12px; color: #8b949e; }
        .stat-value { font-size: 20px; font-weight: bold; margin-top: 5px; color: #58a6ff; }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="group">
            <span class="group-label">Drive Mode</span>
            <div class="btn-container">
                <button id="btn-manual" class="active" onclick="updateMode('manual')">MANUAL</button>
                <button id="btn-auto" onclick="updateMode('auto')">AUTO</button>
            </div>
        </div>
        <div class="group">
            <span class="group-label">System State</span>
            <div class="btn-container">
                <button id="btn-run" onclick="updateState('run')">RUN</button>
                <button id="btn-stop" class="active" onclick="updateState('stop')">STOP</button>
            </div>
        </div>
    </div>

    <div class="camera-container">
        <div class="camera-box">
            <img src="/video_feed_0" alt="Camera 0">
        </div>
        <div class="camera-box">
            <img src="/video_feed_2" alt="Camera 2">
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">LEFT MOTOR</div>
            <div id="val-left" class="stat-value">0.0 RPM</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">RIGHT MOTOR</div>
            <div id="val-right" class="stat-value">0.0 RPM</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">BATTERY</div>
            <div id="val-batt" class="stat-value">12.4 V</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">CPU TEMP</div>
            <div id="val-temp" class="stat-value">45.0 °C</div>
        </div>
    </div>

    <script>
        // ボタン状態の切り替え関数
        function updateMode(mode) {
            document.getElementById('btn-manual').classList.toggle('active', mode === 'manual');
            document.getElementById('btn-auto').classList.toggle('active', mode === 'auto');
            console.log("Mode changed to:", mode);
        }

        function updateState(state) {
            document.getElementById('btn-run').classList.toggle('active', state === 'run');
            document.getElementById('btn-stop').classList.toggle('active', state === 'stop');
            console.log("State changed to:", state);
        }

        // データの定期的更新
        function fetchTelemetry() {
            fetch('/robot_data')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('val-left').innerText = data.left_rpm.toFixed(1) + " RPM";
                    document.getElementById('val-right').innerText = data.right_rpm.toFixed(1) + " RPM";
                    // 他のデータもあればここで更新
                })
                .catch(err => console.error("Telemetry error:", err));
        }

        setInterval(fetchTelemetry, 200);
    </script>
</body>
</html>
